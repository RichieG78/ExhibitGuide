<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exhibit QR Codes</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px;
    }

    h1 {
      text-align: center;
      font-size: 1.4rem;
      color: #333;
      margin-bottom: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 24px;
      max-width: 960px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .card .qr {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .card .label {
      font-size: 1rem;
      font-weight: 600;
      color: #222;
      margin-bottom: 4px;
    }

    .card .url {
      font-size: 0.7rem;
      color: #888;
      word-break: break-all;
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }
      h1 { margin-bottom: 16px; }
      .grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }
      .card {
        box-shadow: none;
        border: 1px solid #ddd;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>
  <h1>Exhibit QR Codes</h1>
  <div class="grid" id="grid"></div>

  <script>
    const BASE_URL = 'https://exhibitguide.onrender.com/exhibits/qr/';
    const START_ID = 1001;
    const END_ID   = 1010;

    const grid = document.getElementById('grid');

    for (let id = START_ID; id <= END_ID; id++) {
      const url = `${BASE_URL}${id}/`;

      const card = document.createElement('div');
      card.className = 'card';

      const qrDiv = document.createElement('div');
      qrDiv.className = 'qr';
      const qrTarget = document.createElement('div');
      qrDiv.appendChild(qrTarget);

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = `Exhibit ${id}`;

      const urlDiv = document.createElement('div');
      urlDiv.className = 'url';
      urlDiv.textContent = url;

      card.appendChild(qrDiv);
      card.appendChild(label);
      card.appendChild(urlDiv);
      grid.appendChild(card);

      new QRCode(qrTarget, {
        text: url,
        width: 160,
        height: 160,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    }
  </script>
</body>
</html>
