<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Exhibit</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .scan-card {
            background-color: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .placeholder-image {
            margin: 1rem 0;
        }
        .scan-button {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: #007BFF;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }
        .scan-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <main class="scan-card">
        <h1>Ready to Scan</h1>
        <p>Use this placeholder flow to simulate a visitor scanning an exhibit label.</p>
        <div class="placeholder-image">
            <img
                src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 720 420'><rect width='720' height='420' fill='%23efe4d3'/><rect x='56' y='56' width='608' height='308' rx='20' fill='%23dcc4a4'/><circle cx='220' cy='176' r='54' fill='%23b66a2c'/><rect x='310' y='132' width='210' height='28' rx='14' fill='%23805c3a'/><rect x='310' y='184' width='150' height='24' rx='12' fill='%239f7d5e'/><rect x='310' y='232' width='118' height='24' rx='12' fill='%239f7d5e'/><text x='360' y='332' text-anchor='middle' font-size='30' font-family='Georgia, serif' fill='%23513b29'>Exhibit Preview</text></svg>"
                alt="Placeholder exhibit preview"
            >
        </div>
        <a class="scan-button" href="{% url 'simulate-scan' %}">Simulate Scan</a>
    </main>
</body>
</html>
