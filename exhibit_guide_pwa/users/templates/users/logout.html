<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out</title>
    <style>
        :root {
            --bg: #f7f1e8;
            --surface: #fffaf3;
            --border: #d8c8b0;
            --ink: #201912;
            --muted: #6f6253;
            --accent: #8b5e34;
            --accent-strong: #6f4926;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: linear-gradient(180deg, #fcf8f1 0%, var(--bg) 100%);
            color: var(--ink);
            font-family: Georgia, "Times New Roman", serif;
        }

        .card {
            width: min(520px, 100%);
            padding: 24px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--surface);
            box-shadow: 0 16px 30px rgba(55, 38, 20, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(1.8rem, 3vw, 2.3rem);
        }

        p {
            margin: 0 0 18px;
            color: var(--muted);
            line-height: 1.5;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .button-link {
            padding: 11px 16px;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            transition: background-color 140ms ease, transform 140ms ease;
        }

        .button-link:hover,
        .button-link:focus-visible {
            background: var(--accent-strong);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>You are logged out</h1>
        <p>Your session has ended. You can sign in again or continue browsing exhibits.</p>
        <div class="actions">
            <a href="{% url 'login' %}" class="button-link">Log In Again</a>
            <a href="{% url 'register' %}" class="button-link">Create Account</a>
            <a href="{% url 'simulate-scan' %}" class="button-link">Back to Exhibit</a>
        </div>
    </main>
</body>
</html>
