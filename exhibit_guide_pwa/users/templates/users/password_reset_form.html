{% extends "exhibits/base.html" %}
{% block content %}
<main class="exhibit-shell auth-shell">
  <section class="auth-card">
    <h1 class="auth-title">Reset Password</h1>
    <h2 class="auth-subtitle">Enter your account email</h2>

    <form method="post" class="auth-form" novalidate>
    {% csrf_token %}

    {% if form.errors %}
      <div class="auth-errors" aria-live="polite">
        <p>Please enter a valid email address.</p>
      </div>
    {% endif %}

    <div class="auth-field">
      <label for="id_email">Email</label>
      <input type="email" name="email" id="id_email" required autocomplete="email">
    </div>

      <button type="submit" class="auth-submit">Send Reset Link</button>
    </form>

    <p class="auth-footnote">
      Remembered it? <a href="{% url 'login' %}">Back to sign in</a>
    </p>
  </section>
</main>
{% endblock content %}
