{% extends "exhibits/base.html" %}
{% block content %}
<main class="exhibit-shell">
  <h1>Reset Password</h1>
  <h2>Enter your account email</h2>

  <form method="post" style="margin-top: 22px;">
    {% csrf_token %}

    {% if form.errors %}
      <div style="margin-bottom: 14px; color: #8b1a1a;">
        Please enter a valid email address.
      </div>
    {% endif %}

    <div style="margin-bottom: 16px;">
      <label for="id_email" style="display: block; margin-bottom: 6px;">Email</label>
      <input type="email" name="email" id="id_email" required style="width: 100%; padding: 10px 12px; border: 1px solid #d8c8b0; border-radius: 10px;">
    </div>

    <button type="submit" style="padding: 12px 18px; border: 0; border-radius: 999px; background: #8b5e34; color: #fff; cursor: pointer;">
      Send Reset Link
    </button>
  </form>

  <p style="margin-top: 14px; color: #6f6253;">
    Remembered it? <a href="{% url 'login' %}">Back to sign in</a>
  </p>
</main>
{% endblock content %}
