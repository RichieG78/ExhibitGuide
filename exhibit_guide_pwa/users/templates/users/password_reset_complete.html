{% extends "exhibits/base.html" %}
{% block content %}
<main class="exhibit-shell auth-shell">
  <section class="auth-card">
    <h1 class="auth-title">Password Updated</h1>
    <h2 class="auth-subtitle">You can now sign in</h2>
    <p class="auth-copy">
      Your password has been reset successfully.
    </p>
    <p class="auth-footnote">
      <a href="{% url 'login' %}">Go to sign in</a>
    </p>
  </section>
</main>
{% endblock content %}
