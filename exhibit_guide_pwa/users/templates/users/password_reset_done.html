{% extends "exhibits/base.html" %}
{% block content %}
<main class="exhibit-shell">
  <h1>Check Your Email</h1>
  <h2>Reset instructions sent</h2>
  <p style="line-height: 1.6; color: #6f6253;">
    If an account exists for that email address, a password reset link has been sent.
    Please check your inbox (and spam folder).
  </p>
  <p style="margin-top: 14px; color: #6f6253;">
    <a href="{% url 'login' %}">Back to sign in</a>
  </p>
</main>
{% endblock content %}
